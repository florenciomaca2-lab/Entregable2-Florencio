<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMULADOR DE GASTOS MENSUALES </title>
    <link rel="stylesheet" href="css/styles.css">

</head>
<body>
     <h1 class="titulo">Simulador de Gastos Mensuales</h1>
     <p class="subtitulo">Tu control mensual</p>

    <section class="app">

        <!--LADO IZQUIERDO DE LA APP-->
        <article class="izquierda">

            <form id="formGasto">
                <input type="text" id="nombre" placeholder="Nombre del gasto" required>
                <input type="number" id="monto" placeholder="Monto del gasto" required>
                <select id="categoria"></select>
                <button type="submit">Agregar Gasto</button>
            </form>

            <input type="text" id="filtro" placeholder="Buscar gasto...">

            <select id="ordenar">
                <option value="">Ordenar</option>
                <option value="mayor">Mayor a Menor</option>
                <option value="menor">Menor a Mayor</option>
            </select>

            <h2>Lista de gastos</h2>
            <ul id="listaGastos"></ul>

            <h3>Total: $<span id="total">0</span></h3>
        </article>

        <!---Lado derecho-->

        <aside class="derecha">
            <canvas id="grafico"></canvas>
        </aside>
    </section> 

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
